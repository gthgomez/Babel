# docker-compose.jaeger.yml — Local Jaeger collector for Babel OTel tracing
#
# Usage:
#   docker compose -f docker-compose.jaeger.yml up -d
#   docker compose -f docker-compose.jaeger.yml down
#
# After starting, set these env vars in your .env (or shell):
#   BABEL_OTEL_ENABLED=true
#   BABEL_OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4318/v1/traces
#
# Then run any babel pipeline command. View traces at:
#   http://localhost:16686
#
# See docs/BABEL_OTEL_LOCAL_VALIDATION.md for the full developer guide.

services:
  jaeger:
    image: jaegertracing/all-in-one:1.60
    container_name: babel-jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC (optional)
      - "4318:4318"     # OTLP HTTP (used by babel-cli)
    restart: unless-stopped
