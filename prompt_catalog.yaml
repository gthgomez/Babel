    description: >
      Structured result delivery contract for unattended async task output to messaging
      surfaces (Slack, Discord, webhook). Enforces STATUS / CONFIDENCE / SUMMARY header
      before any prose, confidence labeling for inline claims (observed / inferred /
      assumed), PARTIAL completion resume-path requirement, and BLOCKED halt-report
      format. Platform formatting rules for Slack, Discord, WhatsApp, and JSON webhook.
