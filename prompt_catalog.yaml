  - id: skill_untrusted_input_guard
    layer: skill
    path: 02_Skills/Governance/Untrusted-Input-Guard-v1.md
    description: >
      Prompt injection defense for autonomous agents that consume external input.
      Classifies input sources (TRUSTED / OPERATOR / UNTRUSTED), scans for injection
      patterns, extracts legitimate task data, and emits an INJECTION SCAN RESULT
      audit block. Required for any agent reading Slack, Discord, files, APIs, or
      webhooks. Does not replace task planning — gates entry into planning.
    status: active
    tags: [governance:safety, skill, utility:autonomous, utility:injection, utility:security, utility:untrusted-input]
    dependencies: []
    conflicts: []
    token_budget: 380

  - id: skill_autonomous_agent_state_machine
    layer: skill
    path: 02_Skills/Governance/Autonomous-Agent-State-Machine-v1.md
    description: >
      Extends OLS-v7-Core's binary PLAN/ACT model to a six-state machine for unattended
      autonomous operation: IDLE → PLAN → WAIT_FOR_APPROVAL → ACT → REPORT → IDLE,
      with HALT reachable from any state. Defines blast-radius-aware absent-user protocol
      with confidence routing and per-tier approval windows (2h MEDIUM, 24h HIGH).
      Includes hold message format, halt report format, and session-start acknowledgment.
      Load for any task received via async channel or any MEDIUM/HIGH blast radius task.
    status: active
    tags: [governance:safety, skill, utility:async, utility:autonomous, utility:halt, utility:hitl, utility:state-machine]
    dependencies:
