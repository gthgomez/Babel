# 01 — BEHAVIORAL OS  (always loaded, always first)
# ─────────────────────────────────────────────

  - id: behavioral_core_v7
    layer: behavioral_os
    path: 01_Behavioral_OS/OLS-v7-Core-Universal.md
    description: >
      Universal state machine (PLAN → ACT). Enforces execution discipline,
      minimal action, and verification-first behavior across all agents.
      Load position [1] — always first in any manifest.
    status: active
    load_position: 1
    tags: [core, state_machine, always_load]
    token_budget: 450

  - id: behavioral_cognitive_micro_v7
    layer: behavioral_os
    path: 01_Behavioral_OS/OLS-v7-Cognitive-Micro.md
    description: >
      Minimal universal cognitive layer. Restores contextual anchoring,
      facts-vs-inference separation, and explicit low-confidence signaling
      without adding domain reasoning. Load position [2] — always loaded after
      Core and before Guard.
    status: active
    load_position: 2
    tags: [cognitive, epistemic, always_load]
    token_budget: 150

  - id: behavioral_guard_v7
    layer: behavioral_os
    path: 01_Behavioral_OS/OLS-v7-Guard-Auto.md
    description: >
      Autonomous execution safety gates. Defines the conditions under which an
      agent may act without human confirmation. Load position [3] — always
      loaded after Core and Cognitive Micro.
    status: active
    load_position: 3
    # always_load: Guard is always included in the assembled manifest.
    # The runtime/task context decides when Guard's behavioral gates are actively
    # enforced. In planning/research/brainstorm/architecture contexts, Guard is
    # present but its action gates must not be treated as universally active.
    tags: [guard, safety, always_load]
    token_budget: 325

