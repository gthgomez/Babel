      shared auth helper functions), auto-retrying assertions, dark/light mode
      testing with emulateMedia, screenshot conventions (test-results/ directory),
      CI integration (playwright install --with-deps, artifact upload), and
      high-risk zones (hardcoded credentials, waitForTimeout, test.only committed).
    status: active
    tags: [playwright, e2e, testing, accessibility, aria, example_web_audit, skill]
    dependencies: []
    conflicts: []
