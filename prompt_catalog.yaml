# ─────────────────────────────────────────────
# 00 — SYSTEM ROUTER
# ─────────────────────────────────────────────
entries:

  - id: system_bible
    layer: entrypoint
    path: BABEL_BIBLE.md
    description: >
      Human-facing Babel entrypoint. Tells any model or operator how to use the
      Babel system, which files are authoritative, and how to assemble a prompt
      stack from the catalog.
    status: active
    tags: [entrypoint, bible, human, llm]

  - id: orchestrator_v8
    layer: orchestrator
    path: 00_System_Router/OLS-v8-Orchestrator.md
    description: >
      Master dispatcher. Reads user input, matches project, classifies task type,
      selects model adapter, and outputs a strict JSON prompt manifest for the
      Worker Agent pipeline. Outputs JSON only — no prose.
    status: active
    supersedes: "00_System_Router/Orchestrator_Router-v1.0.md"
    tags: [router, orchestrator, pipeline_entry]
    token_budget: 220

  - id: orchestrator_v9
    layer: orchestrator
    path: 00_System_Router/OLS-v9-Orchestrator.md
    description: >
      Typed instruction orchestrator. Emits structured routing intent via
      instruction_stack plus resolution policy, leaving prompt_manifest
      compilation to the downstream resolver/compiler.
    status: active
    tags: [router, orchestrator, pipeline_entry, typed, compiler_lane]
    token_budget: 240

# ─────────────────────────────────────────────
# 01 — BEHAVIORAL OS  (always loaded, always first)
# ─────────────────────────────────────────────

  - id: behavioral_core_v7
    layer: behavioral_os
    path: 01_Behavioral_OS/OLS-v7-Core-Universal.md
    description: >
      Universal state machine (PLAN → ACT). Enforces execution discipline,
      epistemic honesty, and the anti-eager behavior pattern across all agents.
      Load position [1] — always first in any manifest.
    status: active
    load_position: 1
    tags: [core, state_machine, always_load]
    token_budget: 450

  - id: behavioral_guard_v7
    layer: behavioral_os
    path: 01_Behavioral_OS/OLS-v7-Guard-Auto.md
    description: >
      Autonomous execution safety gates. Defines the conditions under which an
      agent may act without human confirmation. Load position [2] — always
      second in any manifest.
    status: active
    load_position: 2
    # always_load: Guard is always included in the assembled manifest (selection
    # authority). Whether Guard behavioral gates are ACTIVE is governed by
    # ACTIVATION_CONTRACT.yaml, not this tag. In planning/research/brainstorm/
    # architecture contexts, Guard is present but its gates must not be enforced.
    tags: [guard, safety, always_load]
    token_budget: 325

