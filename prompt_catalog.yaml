  - id: skill_nodejs_cli
    layer: skill
    path: 02_Skills/Framework/NodeJS-CLI-v1.md
    description: >
      Node.js CLI tool patterns for ES module projects. Covers package.json bin
      setup (type: "module", shebang requirement, engines field), __dirname
      reconstruction in ESM (fileURLToPath + dirname(import.meta.url)), path
      resolution split (__dirname for bundled assets vs process.cwd() for user
      output), argument parsing (manual argv.slice(2) loop for simple tools,
      node:util parseArgs for flag-heavy tools), exit code contract (0=success
      including empty results, 1=user/arg error, 2=tool failure), stdout vs stderr
      discipline (machine output on stdout only, all human messages on stderr),
      file system output (resolve() before join(), mkdirSync recursive, writeFileSync
      preference over async for CLI), graceful error handling (fatal vs non-fatal
      split, DEBUG env var for stack traces, cleanup in finally), and high-risk
      zones (missing .js extension in ESM imports, process.exit() in library code,
      unhandled promise rejection in main, stdout contamination).
    status: active
    tags: [nodejs, cli, esm, modules, args, exit-codes, filesystem, skill]
    dependencies: []
    conflicts: []
    default_for_domains:
