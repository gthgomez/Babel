  - id: domain_research
    layer: domain_architect
    path: 02_Domain_Architects/General_Research-v4.1.md
    description: >
      General research and strategy agent. Uses MPAF/GSA frameworks for
      structured investigation. Apex of OLS v4.1 General APEX lineage.
    status: active
    load_position: 3
    tags: [research, strategy, analysis]

  - id: domain_devops
    layer: domain_architect
    path: 02_Domain_Architects/DevOps_Architect-v1.0.md
    description: >
      Principal SRE/DevOps architect. Classifies every change as Stateful,
      Stateless, or Read-Only. Enforces the Four Fails Standard (Fast, Safe,
      Observable, Idempotent), mandatory ROLLBACK_STRATEGY and INFRA_BCDP for
      stateful changes, dry-run gate before all applies, and strict secrets
      management. Adds INFRA_ACT gate for production stateful changes beyond
      the standard QA PASS.
    status: active
    load_position: 3
    tags: [devops, infra, cicd, docker, terraform, vercel, migrations, secrets]

  - id: pipeline_qa_reviewer
    layer: pipeline_stage
    path: 02_Domain_Architects/QA_Adversarial_Reviewer-v1.0.md
    description: >
      Adversarial QA gate. Reviews SWE plans across six audit layers: Evidence Gate,
      SFDIPOT coverage, NAMIT code-level checklist, BCDP contract verification,
      Security audit, and Root Cause verification. Outputs only PASS or REJECT with
      tagged failures and per-claim confidence scores. Never writes code. Loaded by
      pipeline_mode: verified or autonomous.
    status: active
    load_position: 7
    tags: [qa, namit, sfdipot, bcdp, pipeline_stage, verification]
    token_budget: 425

  - id: pipeline_cli_executor
    layer: pipeline_stage
    path: 02_Domain_Architects/CLI_Executor-v1.0.md
    description: >
      CLI "Hands" agent. Activates only after QA PASS. Translates the approved
      MINIMAL ACTION SET into physical tool calls (file_read, file_write,
      shell_exec, test_run) one step at a time with verification after each.
      On any failure, halts and emits a PIPELINE_ERROR payload routed back to
      the SWE Agent. Zero architectural authority. Loaded by pipeline_mode: autonomous.
    status: active
    load_position: 8
    tags: [cli, executor, pipeline_stage, autonomous, file_write, shell_exec]

