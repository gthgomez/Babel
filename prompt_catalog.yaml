# ─────────────────────────────────────────────────────────────────────────────
# SKILL BOUNDARY MAP  (Fix F1 — critique remediation 2026-04-26)
# When two skills overlap in purpose, use this table to pick the right one.
# Loading both is never wrong on safety grounds, but wastes token budget.
# ─────────────────────────────────────────────────────────────────────────────
#
# Evidence gathering vs. Run artifact inspection
#   skill_evidence_gathering       → Use BEFORE planning. Pre-plan file/schema/consumer index.
#   skill_run_artifact_inspection  → Use to READ existing Babel run outputs (evidence bundles,
#                                    manifests, summaries). Post-run inspection, not pre-plan.
#
# BCDP contracts vs. Security release gate
#   skill_bcdp_contracts           → Use for any contract change (API, schema, type, event).
#                                    Classifies COMPATIBLE / RISKY / BREAKING.
#   skill_security_release_gate    → Use AFTER fixes are complete. Converts completed work
#                                    into a formal launch/no-launch verdict. Gate, not audit.
#
# RLS drift audit vs. Exposed schema hardening
#   skill_supabase_rls_drift_audit → Use when live DB state may have drifted from repo intent.
#                                    Audit-first, comparison-based.
#   skill_supabase_exposed_schema_hardening → Use when inventorying what PostgREST exposes and
#                                    producing the minimal revoke/RLS plan. Action-oriented.
#
# Ops observability vs. Idempotency contract
#   skill_ops_observability        → Logging strategy, recovery paths, correlation IDs.
#   skill_idempotency              → Deduplication and retry surface per mutation.
#   Load BOTH for webhook handlers. Load only ops_observability for read-only endpoints.
#
# Google Play Billing vs. RevenueCat IAP
#   skill_google_play_billing      → Use for direct BillingClient v7/v8 integration (Play only).
#   skill_revenuecat_iap           → Use for RevenueCat SDK v9+ (cross-store: Play + Amazon).
#   Never load both — they are mutually exclusive billing approaches.
#
# Android UI audit review vs. Android accessibility semantics
#   skill_android_ui_audit_review  → Grounded audit of existing screens; findings-first critique.
#   skill_android_accessibility_semantics → Specific TalkBack / content-description / contrast work.
#   Load accessibility skill when the audit specifically surfaces a11y gaps.
#
# Android game vs. Android TV game UX
#   skill_android_game_development → Native/game-loop, AGDK, frame pacing, controller, game memory.
#   skill_android_tv_game_ux       → Leanback, Fire TV, D-pad focus, 10-foot UX, TV manifest.
#   Load both for Android TV games with game-loop or controller implementation work.
#
# Godot UI theme vs. UI runtime
#   skill_godot_ui_theme           → Theme resources, visual style, fonts, colors, margins.
#   skill_godot_ui_runtime         → HUD/menu flow, CanvasLayer, focus, localization, resolution.
#   Load both when changing both interaction structure and styling.
#
# Godot UI runtime vs. HD-2D RPG UI
#   skill_godot_ui_runtime         → General Godot UI behavior, focus, layout, CanvasLayer.
#   skill_godot_hd2d_rpg_ui        → Octopath-adjacent JRPG battle/menu grammar,
#                                    ornate frames, weakness/boost chips, serif RPG UI.
#   Load both for implementation work on an HD-2D RPG interface.
#
# HD-2D map design vs. mobile rendering
#   skill_godot_hd2d_map_design    → Map scene structure, terrain, props, lighting/camera profiles.
#   skill_godot_hd2d_mobile_rendering → Renderer choice, SubViewport world, native UI,
#                                    post-effect quality tiers, mobile export evidence.
#   Load mobile rendering whenever Android/iOS HD-2D render architecture is involved.
#
# HD-2D RPG UI vs. mobile JRPG UX
#   skill_godot_hd2d_rpg_ui        → Original premium JRPG visual grammar and combat state UI.
#   skill_godot_mobile_jrpg_ux     → Touch targets, thumb zones, safe areas, preview/confirm,
#                                    phone battle layout variants, accessibility settings.
#   Load both for mobile HD-2D JRPG battle or menu work.
#
# Dirty worktree triage vs. GitHub release batching
#   skill_dirty_worktree_triage    → Use first to classify staged/unstaged changes into buckets.
#   skill_github_release_batching  → Use after triage to order and push clean commit batches.
#   Always load triage before batching; batching depends on triage output.
#
# ─────────────────────────────────────────────────────────────────────────────

