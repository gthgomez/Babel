    path: 02_Skills/Framework/SSE-Streaming-v1.md
    description: >
      Server-Sent Events (SSE) production and consumption patterns for Deno Edge
      Functions and React clients. Covers SSE wire format (Content-Type, Cache-Control,
      double-newline framing, [DONE] sentinel, keep-alive pings), server-side stream
      production with TransformStream and EdgeRuntime.waitUntil(), provider normalization
      contract (Anthropic/OpenAI/Google → unified { type, delta } shape), response headers
      as stable API contract (X-Router-Model, X-Provider, X-Cost-Estimate-USD), fetch vs
      EventSource decision (fetch required for auth/headers), ReadableStream line parser,
      AbortController lifecycle (abort on unmount, AbortError → 504 mapping), and
      high-risk zones (buffering, missing DONE, header contract drift).
    status: active
