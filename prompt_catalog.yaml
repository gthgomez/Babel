    path: 02_Skills/Mobile/Android-Dependency-Research-v1.md
    description: >
      Pre-implementation dependency verification protocol for Android/Gradle projects. Covers three
      failure modes: wrong artifact name/version (artifact renamed between major versions; version
      doesn't exist on Maven Central), runtime-scope compile gap (transitive dep declared runtime in
      POM or Gradle module metadata is absent from compile classpath; unresolved reference errors),
      and major-version API breaks (renamed methods, removed callbacks, restructured packages).
      Protocol: verify artifact via maven-metadata.xml curl before writing any implementation line;
      find latest version via GitHub releases API; inspect POM scope and Gradle .module API vs
      Runtime variants to identify which transitive deps need to be added explicitly; check library
      source and CHANGELOG before using any API from a new major version; check for coroutine
      await* extensions as cleaner alternatives to callback-style APIs; verify settings.gradle.kts
      repo declarations. Includes hard rules against guessing artifact names, assuming transitive
      compile availability, or copy-pasting version numbers from docs without verification.
