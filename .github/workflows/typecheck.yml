name: Public Release Gate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security:
    name: security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run local public scrub
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File tools/check-public-scrub.ps1 -Strict
      - name: Install pinned gitleaks
        shell: pwsh
        run: |
          $version = '8.30.1'
          $expectedSha256 = '551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb'
          $archiveName = "gitleaks_${version}_linux_x64.tar.gz"
          $executableName = 'gitleaks'
          $archivePath = Join-Path $env:RUNNER_TEMP $archiveName
          $installDir = Join-Path $env:RUNNER_TEMP "gitleaks-$version"
          $downloadUrl = "https://github.com/gitleaks/gitleaks/releases/download/v${version}/${archiveName}"

          Invoke-WebRequest -UseBasicParsing -Uri $downloadUrl -OutFile $archivePath
          $actualSha256 = (Get-FileHash -Algorithm SHA256 -LiteralPath $archivePath).Hash.ToLowerInvariant()
          if ($actualSha256 -ne $expectedSha256) {
            throw "gitleaks checksum mismatch. Expected $expectedSha256 but got $actualSha256."
          }

          New-Item -ItemType Directory -Path $installDir -Force | Out-Null
          tar -xzf $archivePath -C $installDir
          "$installDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & (Join-Path $installDir $executableName) version
      - name: Run required public secret scan
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File tools/run-public-secret-scan.ps1 -RepoRoot . -Strict -RequireExternalScanner

  linux-validation:
    name: linux-validation
    needs: security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: babel-cli/package-lock.json
      - name: Install dependencies
        run: npm ci --ignore-scripts
        working-directory: babel-cli
      - name: Typecheck CLI
        run: npm run typecheck
        working-directory: babel-cli
      - name: Validate catalog
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File tools/validate-catalog.ps1

  windows-portability:
    name: windows-portability
    needs: security
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: babel-cli/package-lock.json
      - name: Install dependencies
        run: npm ci --ignore-scripts
        working-directory: babel-cli
      - name: Typecheck CLI
        run: npm run typecheck
        working-directory: babel-cli
      - name: Validate catalog
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File tools/validate-catalog.ps1
      - name: Public scrub (Windows)
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File tools/check-public-scrub.ps1 -Strict
